    我們希望有豐富多彩的蛋糕自助餐，非常歡迎有意貢獻的賓客。如需協調，請直接聯繫蛋糕愛好者第一號 Charlotte：sprengel.charlotte[at]gmail.com

- question: "Frühstück am Sonntag"
  question_en: "Sunday Breakfast"
  question_tw: "週日早餐"
  answer: |
    Mit allen Gästen, die im ApartHotel in Sehnde unterkommen und Lust haben, möchten wir gerne am Sonntagmorgen gemeinsam frühstücken.
  answer_en: |
    With all guests staying at the ApartHotel in Sehnde who would like to join, we would love to have a joint breakfast on Sunday morning.
  answer_tw: |
    我們希望與所有入住 Sehnde ApartHotel 且有意參加的賓客，在週日早上一起享用早餐。

- question: "Geschenke"
  question_en: "Gifts"
  question_tw: "禮物"
  answer: |
    Wir freuen uns sehr, dass so viele unserer Freunde und Familie von überall her anreisen, um diesen besonderen Tag gemeinsam zu feiern! Falls ihr uns zusätzlich etwas schenken mögt, freuen wir uns über einen Obolus, damit wir uns unser erstes gemeinsames Zuhause schön machen können.
  answer_en: |
    We are so happy that so many of our friends and family are travelling from near and far to celebrate this special day with us! If you would like to give us something, we would be delighted with a contribution towards making our first home together a beautiful one.
  answer_tw: |
    我們非常感動，這麼多親友不遠千里趕來共慶這特別的一天！若您希望送上禮物，我們非常感謝您為我們的第一個共同家園所給予的心意。

- question: "Fotos"
  question_en: "Photos"
  question_tw: "照片"
  answer: |
    Während der Trauung, sowie für Gruppen- und Familienbilder haben wir die hervorragende Fotografin Britta engagiert. Bitte genießt also den handyfreien Tag und freut euch auf unbeschwerte Eindrücke im Anschluss.
  answer_en: |
    For the ceremony, as well as group and family photos, we have engaged the excellent photographer Britta. So please set your phones aside, soak up every moment, and look forward to beautiful memories.
  answer_tw: |
    我們聘請了出色的攝影師 Britta 負責儀式及合照拍攝。請放下手機，全心享受當下，靜待美好的回憶。

