- question: "Dresscode"
  question_en: "Dress Code"
  answer: |
    Elegant und festlich. Gerne in Farben, die zu einer Sommerhochzeit passen.
  answer_en: |
    Elegant and festive. Colours that suit a summer wedding are very welcome.

- question: "Essen"
  question_en: "Food"
  answer: |
    Gutes Essen liegt uns sehr am Herzen. Bitte gebt in der <a href="/rsvp">Teilnahme</a> an, was ihr gerne esst oder was wir beachten sollen, damit wir dies entsprechend einplanen können (Allergien, vegetarisch, vegan etc.).
  answer_en: |
    Good food is very important to us. Please indicate in your <a href="/rsvp">RSVP</a> what you would like to eat or anything we should take into account (allergies, vegetarian, vegan etc.).

- question: "Kuchenbuffet"
  question_en: "Cake Buffet"
  answer: |
    Da wir uns ein buntes Kuchenbuffet wünschen, freuen wir uns über alle, die dazu etwas beitragen möchten. Zur Koordination meldet euch bitte bei Kuchenliebhaberin Nr. 1 Charlotte direkt: sprengel.charlotte[at]gmail.com
  answer_en: |
    We would love to have a colourful cake buffet, so we are delighted if anyone would like to contribute. To coordinate, please contact cake-lover No. 1 Charlotte directly: sprengel.charlotte[at]gmail.com

- question: "Frühstück am Sonntag"
  question_en: "Sunday Breakfast"
  answer: |
    Mit allen Gästen, die im ApartHotel in Sehnde unterkommen und Lust haben, möchten wir gerne am Sonntagmorgen gemeinsam frühstücken.
  answer_en: |
    With all guests staying at the ApartHotel in Sehnde who would like to join, we would love to have a joint breakfast on Sunday morning.

- question: "Geschenke"
  question_en: "Gifts"
  answer: |
    Wir freuen uns sehr, dass so viele unserer Freunde und Familie von überall her anreisen, um diesen besonderen Tag gemeinsam zu feiern! Falls ihr uns zusätzlich etwas schenken mögt, freuen wir uns über einen Obolus, damit wir uns unser erstes gemeinsames Zuhause schön machen können.
  answer_en: |
    We are so happy that so many of our friends and family are travelling from near and far to celebrate this special day with us! If you would like to give us something, we would be delighted with a contribution towards making our first home together a beautiful one.

- question: "Fotos"
  question_en: "Photos"
  answer: |
    Während der Trauung, sowie für Gruppen- und Familienbilder haben wir die hervorragende Fotografin Britta engagiert. Bitte genießt also den Tag und freut euch auf unbeschwerte Eindrücke im Anschluss.
  answer_en: |
    For the ceremony, as well as group and family photos, we have engaged the excellent photographer Britta. So please enjoy the day and look forward to wonderful memories afterwards.

- question: "Beiträge, Spiele & Ideen"
  question_en: "Contributions, Games & Ideas"
  answer: |
    Unsere Trauzeugen helfen euch bei Fragen und Anregungen gerne weiter.
  answer_en: |
    Our witnesses will be happy to help with any questions or suggestions.

- question: "Warum Rethmar? "
  question_en: "Why Rethmar?"
  answer: |
    Rethmar ist ein idyllischer, ländlicher Ortsteil der Stadt Sehnde in Niedersachsen mit etwa 2 150 Einwohnern und liegt ruhig eingebettet zwischen Feldern, Wiesen und dem Mittellandkanal südöstlich von Hannover. Er liegt damit in der nähe von Charlottes Heimat Bettrum.
  answer_en: |
    Rethmar is an idyllic, rural district of the town of Sehnde in Lower Saxony with around 2,150 inhabitants, nestled peacefully among fields, meadows and the Mittellandkanal southeast of Hannover — close to Charlotte's home town of Bettrum.

- question: "Standesamtliche Trauung"
  question_en: "Civil Ceremony"
  answer: |
    Unsere standesamtliche Trauung wird bereits am 07. Juni an unserem Herzensort Stockholm im engsten Kreis stattfinden.
  answer_en: |
    Our civil ceremony will take place on 7 June at our beloved Stockholm, with just our nearest and dearest.

- question: "Noch ein paar Kleinigkeiten"
  question_en: "A Few More Things"
  answer: |
    <ul><li>Da unsere Sommerhochzeit hoffentlich viel im malerischen Gutspark stattfinden wird, nehmt gerne eine Jacke mit, falls es am Abend kühl wird.</li><li>Für Wohnwagen und Wohnmobile gibt es einen Stellplatz am Gutshof. Sprecht uns gerne an.</li><li>Bei weiteren Fragen meldet euch bei unseren Trauzeugen oder direkt bei uns.</li></ul>
  answer_en: |
    <ul><li>Since our summer wedding will hopefully take place largely in the picturesque Gutspark, please bring a jacket in case it gets cool in the evening.</li><li>There is a pitch for camper vans and motorhomes at the Gutshof — please let us know if you would like to use this option.</li><li>For any further questions, please contact our witnesses or reach out to us directly.</li></ul>
