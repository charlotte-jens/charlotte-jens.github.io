- question: What should I wear?
  answer: |
    We are confident it will be hot and humid in June. Please dress accordingly. No need for a tux or ball gown. Dress pants and a collared shirt or a casual dress will be just fine.

- question: How do I get to the venue?
  answer: |
    There is a map on the <a href="../details">details page</a>.

- question: Can I bring a date?
  answer: |
    As much as we would love to have everyone, because of venue limitations, please only bring who was addressed on your invitation. If you have a question about this, feel free to contact us.

- question: When is the RSVP deadline?
  answer: |
    Details coming soon. You can RSVP directly on this site!

- question: What time should I arrive?
  answer: |
    Arriving 15-20 minutes early will give you plenty of time to get a seat.

- question: Will food be served?
  answer: |
    Yes! Details coming soon.

- question: Will there be dancing?
  answer: |
    Absolutely! Make sure to fill out the song request option when you RSVP.

- question: Can I take pictures?
  answer: |
    Please no pictures during the ceremony, but take as many as you'd like during the reception!

- question: What if I have a question not listed here?
  answer: |
    Feel free to contact the bride or the groom.
