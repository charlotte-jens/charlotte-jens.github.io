- question: "Adresse der Feier"
  question_en: "Venue Address"
  answer: |
    Gutshof Rethmar<br>Gutsstraße 16<br>31319 Sehnde / Rethmar
  answer_en: |
    Gutshof Rethmar<br>Gutsstraße 16<br>31319 Sehnde / Rethmar

- question: "Anreise"
  question_en: "Getting There"
  answer: |
    Für unsere weitangereisten Gäste ist ein Flug nach Hannover (HAJ) möglich. Von dort aus empfehlen wir euch ein Taxi direkt zum Hotel bzw. zur Feierlocation in Rethmar.<br>Alternativ kann auch die Bahn zum Hannover Hauptbahnhof genommen werden. Von dort aus empfehlen wir euch ebenfalls ein Taxi.<br>Der Gutshof bietet selbst große Parkflächen auch mit E-Lademöglichkeit.
  answer_en: |
    For guests travelling from afar, a flight to Hannover (HAJ) is possible. From there we recommend a taxi directly to the hotel or the venue in Rethmar.<br>Alternatively, you can take the train to Hannover main station. From there we also recommend a taxi.<br>The Gutshof itself offers large parking areas, including EV charging stations.

- question: "Unterkunft"
  question_en: "Accommodation"
  answer: |
    Aufgrund der Nähe zu Hannover und Sehnde gibt es einige Unterkünfte in der Region. Da sich viele kennen und auch am nächsten Morgen noch ein gemeinsames Frühstück stattfindet, haben wir ein Kontingent im <a href="https://www.apart-hotel-sehnde.de/" target="_blank">ApartHotel Sehnde</a> reserviert:<ul><li>Doppelzimmer inkl. Frühstück — 90 €/Nacht</li><li>Dreibettzimmer inkl. Frühstück — 110 €/Nacht</li><li>Vierbettzimmer inkl. Frühstück — 130 €/Nacht</li></ul>Bitte bucht unter dem Stichwort <strong>„Hochzeit Oehlen"*</strong> — Reservierungsfrist: 14. Juli 2026 (1 Monat vorher).<br>Early Check-in ab 10 Uhr ist für 40 € möglich. Zahlung per Bargeld, Kreditkarte oder EC-Karte.
  answer_en: |
    Given the proximity to Hannover and Sehnde, there are several accommodation options in the area. Since many guests know each other and a joint breakfast is planned for Sunday morning, we have reserved rooms at the <a href="https://www.apart-hotel-sehnde.de/" target="_blank">ApartHotel Sehnde</a>:<ul><li>Double room incl. breakfast — €90/night</li><li>Triple room incl. breakfast — €110/night</li><li>Quad room incl. breakfast — €130/night</li></ul>Please book under the keyword <strong>"Hochzeit Oehlen"*</strong> — reservation deadline: 14 July 2026 (1 month prior).<br>Early check-in from 10 am is available for €40. Payment by cash, credit card or debit card.

- question: "Rückfahrt"
  question_en: "Return Journey"
  answer: |
    Hotel und Gutshof sind nur wenige Kilometer voneinander entfernt und es werden Taxen bereitstehen, die euch sicher zum Hotel bringen, wenn die Schuhe durchgetanzt sind. Lasst das Auto also gerne am Hotel stehen.
  answer_en: |
    The hotel and venue are only a few kilometres apart, and taxis will be available to bring you safely back to the hotel when your shoes are danced through. Feel free to leave your car at the hotel.

