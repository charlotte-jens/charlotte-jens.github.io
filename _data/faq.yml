- question: "A — Adresse"
  answer: |
    Gutshof Rethmar, Guttsstraße 16, 31319 Rethmar

- question: "A — Anreise und Parken"
  answer: |
    Für unsere weitangereisten Gäste ist ein Flug nach Hannover (HAJ) möglich. Von dort aus empfehlen wir euch ein Taxi direkt zum Hotel bzw. zur Feierlocation in Rethmar.<br>Alternativ kann auch die Bahn zum Hannover Hauptbahnhof genommen werden. Von dort aus empfehlen wir euch ein Taxi direkt zum Hotel bzw. zur Feierlocation in Rethmar.<br>Der Gutshof bietet selbst große Parkflächen auch mit E-Lademöglichkeit.

- question: "B — Bilder"
  answer: |
    Während der Trauung, sowie für Gruppen- und Familienbilder haben wir die hervorragende Fotografin Britta engagiert. Bitte genießt also den Tag und freut euch auf unbeschwerte Eindrücke im Anschluss.

- question: "C — Cocktails"
  answer: |
    Der Tag wird gespickt sein mit Highlights wie der Cocktailhour. Genießt unsere liebsten Cocktails am späten Abend.

- question: "D — Dauer unserer Beziehung bis zum Tag der Hochzeit"
  answer: |
    2781 Tage

- question: "F — Frühstück"
  answer: |
    Mit allen Gästen, die im ApartHotel in Sehnde unterkommen und Lust haben, möchten wir gerne am Sonntagmorgen gemeinsam frühstücken.

- question: "G — Geschenke"
  answer: |
    Wir freuen uns sehr, dass so viele unserer Freunde und Familie von überall her anreisen, um diesen besonderen Tag gemeinsam zu feiern! Falls ihr uns zusätzlich etwas schenken mögt, freuen wir uns über einen Obolus, damit wir uns unser erstes gemeinsames Zuhause schön machen können.

- question: "I — Ideen, Spiele, Beiträge"
  answer: |
    Unsere Trauzeugen helfen euch bei Fragen und Anregungen gerne weiter. (Mehr Infos dazu unter T — Trauzeugen)

- question: "J — Jacken"
  answer: |
    Da unsere Sommerhochzeit hoffentlich viel im malerischen Gutspark stattfinden wird, nehmt gerne eine Jacke mit, falls es am Abend kühl wird.

- question: "K — Kuchen"
  answer: |
    Da wir uns ein buntes Kuchenbuffet wünschen, freuen wir uns über alle, die dazu etwas beitragen möchten. Zur Koordination meldet euch bitte bei Kuchenliebhaberin Nr. 1 Charlotte direkt: sprengel.charlotte[at]gmail.com

- question: "L — Luftballons"
  answer: |
    Luftballons würden wir aus Liebe zur Natur gerne vermeiden. Nachhaltigkeit liegt uns dabei sehr am Herzen.

- question: "N — Nachtruhe"
  answer: |
    Bei der Suche einer Location haben wir extra darauf geachtet, dass uns nichts einschränkt. Wir hoffen, ihr tanzt mit uns bis die Sonne wieder aufgeht — und dann trinken wir noch ein Bier am Gutsteich.

- question: "O — Ort"
  answer: |
    Warum Rethmar? Rethmar ist ein idyllischer, ländlicher Ortsteil der Stadt Sehnde in Niedersachsen mit etwa 2.150 Einwohnern und liegt ruhig eingebettet zwischen Feldern, Wiesen und dem Mittellandkanal südöstlich von Hannover. Er liegt damit in der Nähe von Charlottes Heimat Bettrum.

- question: "R — Rückfahrt"
  answer: |
    Hotel und Gutshof sind nur wenige Kilometer voneinander entfernt und es werden Taxen bereitstehen, die euch sicher zum Hotel bringen, wenn die Schuhe durchgetanzt sind. Lasst das Auto also gerne am Hotel stehen.

- question: "S — Standesamt"
  answer: |
    Unsere standesamtliche Trauung wird bereits am 07. Juni an unserem Herzensort Stockholm im engsten Kreis stattfinden.

- question: "T — Trauzeugen"
  answer: |
    Für Fragen und Anliegen meldet euch gerne bei unseren reizenden Trauzeugen:
    <ul><li>Jan Philipp — jan.philipp.rauprich[at]gmail.com</li><li>Luisa — luisa.hieckel[at]gmail.com</li><li>Zoe — zoe.lguillou[at]gmail.com</li></ul>

- question: "U — Unterkunft"
  answer: |
    Aufgrund der Nähe zu Hannover und Sehnde gibt es einige Unterkünfte in der Region. Da sich viele kennen und auch am nächsten Morgen noch ein gemeinsames Frühstück stattfindet, haben wir ein Kontingent im ApartHotel Sehnde reserviert:
    <ul><li>Doppelzimmer inkl. Frühstück — 90 €/Nacht</li><li>Dreibettzimmer inkl. Frühstück — 110 €/Nacht</li><li>Vierbettzimmer inkl. Frühstück — 130 €/Nacht</li></ul>

- question: "V — Vegetarische / Vegane Optionen"
  answer: |
    Bitte gebt in der Teilnahmeumfrage an, was ihr gerne esst, damit wir dies entsprechend einplanen. Gutes Essen ist uns, wie ihr alle wisst, sehr wichtig ;)

- question: "W — Wohnwagen / Wohnmobil"
  answer: |
    Hierfür gibt es einen Stellplatz am Gutshof. Falls also jemand gerne diese Möglichkeit nutzen möchte, sprecht uns gerne an.

- question: "X — XY-ungelöst"
  answer: |
    Bei Fragen meldet euch gerne bei unseren Trauzeugen oder bei uns direkt.
