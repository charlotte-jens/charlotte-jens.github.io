- question: Wo findet die Feier statt?
  answer: |
    Gutshof Rethmar, Guttsstraße 16, 31319 Rethmar

- question: Wie reise ich an und wo kann ich parken?
  answer: |
    Für Gäste von weiter weg empfehlen wir den Flug nach Hannover (HAJ) und dann weiter per Taxi zum Hotel oder direkt zum Gutshof. Alternativ geht es mit dem Zug bis zum Hannover Hauptbahnhof. Der Gutshof bietet selbst große Parkflächen, auch mit E-Lademöglichkeit.

- question: Gibt es einen Fotografen?
  answer: |
    Ja! Die Fotografin Britta ist für die Trauung sowie die Gruppen- und Familienfotos engagiert.

- question: Was erwartet uns am Tag?
  answer: |
    Der Tag wird gespickt sein mit Highlights wie der Cocktailhour — lasst euch überraschen!

- question: Wie lange seid ihr schon zusammen?
  answer: |
    2781 Tage bis zu unserem Hochzeitstag.

- question: Gibt es ein gemeinsames Frühstück am Sonntag?
  answer: |
    Ja! Alle Gäste, die im ApartHotel in Sehnde übernachten, sind herzlich zum gemeinsamen Sonntagsfrühstück eingeladen.

- question: Was wünscht ihr euch als Geschenk?
  answer: |
    Wir freuen uns über einen Beitrag zur Einrichtung unseres ersten gemeinsamen Zuhauses — Geldgeschenke sind herzlich willkommen.

- question: Brauche ich eine Jacke?
  answer: |
    Ja, bitte bringt für die kühleren Abendstunden im Park eine Jacke mit.

- question: Gibt es Kuchen?
  answer: |
    Es wird ein buntes Kuchenbuffet geben! Wer einen Kuchen beisteuern möchte, darf sich gerne bei Charlotte melden, damit wir es koordinieren können.

- question: Und Luftballons?
  answer: |
    Luftballons würden wir aus Liebe zur Natur gerne vermeiden.

- question: Wie lange wird gefeiert?
  answer: |
    Der Gutshof ermöglicht ein langes Feiern — tanzen bis in den Morgen und Drinks am Teich sind eingeplant.

- question: Wo liegt Rethmar genau?
  answer: |
    Rethmar ist ein idyllischer Ort in Sehnde, Niedersachsen, mit etwa 2.150 Einwohnern — ruhig, grün und perfekt für eine Hochzeitsfeier.

- question: Wie komme ich nach der Feier zurück ins Hotel?
  answer: |
    Es werden Taxis organisiert, die euch nach der Feier sicher zurück ins Hotel bringen.

- question: Wann ist eure standesamtliche Trauung?
  answer: |
    Unsere standesamtliche Trauung findet bereits am 07. Juni in unserem Herzensort Stockholm im engsten Kreis statt.

- question: An wen kann ich mich bei Fragen wenden?
  answer: |
    Unsere Trauzeugen Jan Philipp, Luisa und Zoe helfen gerne bei Fragen und Ideen weiter — oder ihr wendet euch direkt an uns!

- question: Wo kann ich übernachten?
  answer: |
    Wir haben Zimmer im ApartHotel Sehnde reserviert. Die Preise pro Nacht (inkl. Frühstück) sind wie folgt:
    <ul>
      <li>Doppelzimmer: 90 €</li>
      <li>Dreibettzimmer: 110 €</li>
      <li>Vierbettzimmer: 130 €</li>
    </ul>

- question: Gibt es vegetarische oder vegane Optionen?
  answer: |
    Ja! Bitte gebt eure Ernährungspräferenzen in der Teilnahmeumfrage an.

- question: Kann ich mit dem Wohnwagen oder Wohnmobil kommen?
  answer: |
    Ja, auf dem Gelände des Gutshofs steht ein Stellplatz für Wohnwagen und Wohnmobile zur Verfügung.
