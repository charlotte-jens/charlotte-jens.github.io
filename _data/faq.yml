    Elegant and festive. Colours that suit a summer wedding are very welcome.
  answer_tw: |
    優雅正式。歡迎穿著適合夏日婚禮的色系。

- question: "Essen"
  question_en: "Food"
  question_tw: "餐飲"
  answer: |
    Gutes Essen liegt uns sehr am Herzen. Bitte gebt im <a href="/rsvp">Rückmeldeformular</a> an, was ihr gerne esst oder was wir beachten sollen, damit wir dies entsprechend einplanen können (Allergien, vegetarisch, vegan etc.).
  answer_en: |
    Good food is very important to us. Please indicate in your <a href="/rsvp">RSVP</a> what you would like to eat or anything we should take into account (allergies, vegetarian, vegan etc.).
  answer_tw: |
    美食對我們非常重要。請在<a href="/rsvp">回覆表單</a>中告知您的飲食偏好或需注意事項（過敏、素食、純素等），以便我們妥善安排。

